<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Caja</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .cart-item {
            display: flex;
            justify-content: space-between;
            padding: 12px 0;
            border-bottom: 1px solid #e2e8f0;
        }
        .total {
            font-size: 28px;
            font-weight: bold;
            text-align: right;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 2px solid #e2e8f0;
        }
        .search-results {
            position: absolute;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            max-height: 200px;
            overflow-y: auto;
            width: 100%;
            z-index: 100;
        }
        .search-result-item {
            padding: 10px 14px;
            cursor: pointer;
            border-bottom: 1px solid #f1f5f9;
        }
        .search-result-item:hover { background: #f8fafc; }
        .relative { position: relative; }
    </style>
</head>
<body>
    <div class="main-content">
        <h1 style="margin-bottom: 8px;">💰 Caja</h1>
        <p style="color: #64748b; margin-bottom: 24px;">Registro de ventas</p>
        
        <div class="card">
            <h3 style="margin-bottom: 16px;">Agregar Producto</h3>
            <div class="relative">
                <input type="text" id="productSearch" placeholder="Buscar producto..." autocomplete="off">
                <div id="searchResults" class="search-results" style="display:none;"></div>
            </div>
            <div style="display: flex; gap: 12px; margin-top: 16px;">
                <input type="number" id="quantity" value="1" style="width: 100px;">
                <button id="addToCartBtn" class="btn btn-primary" disabled style="flex:1;">Agregar</button>
            </div>
        </div>
        
        <div class="card">
            <h3 style="margin-bottom: 16px;">Carrito</h3>
            <div id="cartItems">
                <div style="text-align:center; padding:20px; color:#64748b;">Sin productos</div>
            </div>
            <div class="total">
                Total: $<span id="totalAmount">0.00</span>
            </div>
            <button id="checkoutBtn" class="btn btn-success" style="width:100%; margin-top:20px;">Finalizar Venta</button>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/js/supabase-client.js"></script>
    <script src="/js/auth.js"></script>
    <script>
        let cart = [];
        let selectedProduct = null;
        let searchTimeout;
        
        async function searchProducts() {
            const term = document.getElementById('productSearch').value;
            if (term.length < 2) {
                document.getElementById('searchResults').style.display = 'none';
                return;
            }
            const { data } = await window.supabaseClient
                .from('products')
                .select(`id, name, brand, unit, prices(price)`)
                .ilike('name', `%${term}%`)
                .limit(10);
            const resultsDiv = document.getElementById('searchResults');
            if (data && data.length > 0) {
                resultsDiv.innerHTML = data.map(p => {
                    const bestPrice = p.prices?.length > 0 ? Math.min(...p.prices.map(pr => pr.price)) : null;
                    return `<div class="search-result-item" onclick="selectProduct(${p.id}, '${p.name} ${p.brand}', ${bestPrice || 0})">
                        <strong>${p.name} - ${p.brand}</strong>
                        ${bestPrice ? `<br>$${bestPrice} (${p.unit || 'unidad'})` : '<br>Sin precio'}
                    </div>`;
                }).join('');
                resultsDiv.style.display = 'block';
            } else {
                resultsDiv.style.display = 'none';
            }
        }
        
        function selectProduct(id, name, price) {
            if (price === 0) { alert('Sin precio'); return; }
            selectedProduct = { id, name, price };
            document.getElementById('productSearch').value = name;
            document.getElementById('searchResults').style.display = 'none';
            document.getElementById('addToCartBtn').disabled = false;
        }
        
        function addToCart() {
            if (!selectedProduct) return;
            const quantity = parseInt(document.getElementById('quantity').value) || 1;
            cart.push({ ...selectedProduct, quantity, subtotal: selectedProduct.price * quantity });
            updateCartDisplay();
            selectedProduct = null;
            document.getElementById('productSearch').value = '';
            document.getElementById('quantity').value = '1';
            document.getElementById('addToCartBtn').disabled = true;
        }
        
        function updateCartDisplay() {
            const container = document.getElementById('cartItems');
            let total = 0;
            if (cart.length === 0) {
                container.innerHTML = '<div style="text-align:center; padding:20px; color:#64748b;">Sin productos</div>';
                document.getElementById('totalAmount').innerText = '0.00';
                return;
            }
            container.innerHTML = cart.map((item, index) => {
                total += item.subtotal;
                return `<div class="cart-item">
                    <div><strong>${item.name}</strong><br><span style="font-size:12px;">$${item.price} x ${item.quantity}</span></div>
                    <div><strong>$${item.subtotal.toFixed(2)}</strong> <button onclick="removeFromCart(${index})" class="btn btn-danger" style="padding:4px 8px;">X</button></div>
                </div>`;
            }).join('');
            document.getElementById('totalAmount').innerText = total.toFixed(2);
        }
        
        function removeFromCart(index) { cart.splice(index, 1); updateCartDisplay(); }
        function checkout() {
            if (cart.length === 0) return alert('Carrito vacío');
            const total = cart.reduce((s, i) => s + i.subtotal, 0);
            if (confirm(`Total: $${total.toFixed(2)}\n¿Finalizar?`)) {
                alert('Venta finalizada');
                cart = [];
                updateCartDisplay();
            }
        }
        
        document.getElementById('productSearch').addEventListener('input', () => {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(searchProducts, 300);
        });
        document.getElementById('addToCartBtn').addEventListener('click', addToCart);
        document.getElementById('checkoutBtn').addEventListener('click', checkout);
        checkAccess().then(() => buildMenu());
    </script>
</body>
</html>
