<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Comparador - AlmacenDelivery</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .search-box {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid #e2e8f0;
            border-radius: 40px;
            font-size: 14px;
            margin-bottom: 20px;
        }
        .category-filter {
            display: flex;
            flex-wrap: wrap;
            gap: 8px;
            margin-bottom: 24px;
        }
        .category-btn {
            padding: 6px 16px;
            background: #f1f5f9;
            border: none;
            border-radius: 30px;
            font-size: 13px;
            cursor: pointer;
            transition: all 0.2s;
        }
        .category-btn.active {
            background: #0f172a;
            color: white;
        }
    </style>
</head>
<body>
    <div class="main-content">
        <h1 style="margin-bottom: 8px;">🔍 Comparador de Precios</h1>
        <p style="color: #64748b; margin-bottom: 24px;">Compará precios entre proveedores</p>
        
        <input type="text" id="search" class="search-box" placeholder="Buscar producto o marca...">
        
        <div class="category-filter" id="categoryFilter">
            <button class="category-btn active" data-category="all">Todos</button>
        </div>
        
        <div id="results">
            <div style="text-align:center; padding:40px; color:#64748b;">Cargando productos...</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/js/supabase-client.js"></script>
    <script src="/js/auth.js"></script>
    <script>
        let allProducts = [];
        let categories = [];
        let selectedCategory = 'all';
        
        async function loadCategories() {
            const { data } = await window.supabaseClient.from('categories').select('id, name').order('name');
            categories = data || [];
            const filterDiv = document.getElementById('categoryFilter');
            filterDiv.innerHTML = '<button class="category-btn active" data-category="all" onclick="filterByCategory(\'all\')">Todos</button>' + 
                categories.map(cat => `<button class="category-btn" data-category="${cat.id}" onclick="filterByCategory(${cat.id})">${cat.name}</button>`).join('');
        }
        
        async function loadProducts() {
            const { data } = await window.supabaseClient
                .from('products')
                .select(`id, name, brand, unit, category_id, categories(name), prices(price, updated_at, provider_id, providers(name))`)
                .order('name');
            if (data) {
                allProducts = data;
                filterProducts();
            }
        }
        
        function filterProducts() {
            let filtered = allProducts;
            if (selectedCategory !== 'all') {
                filtered = filtered.filter(p => p.category_id === selectedCategory);
            }
            const searchTerm = document.getElementById('search').value.toLowerCase();
            if (searchTerm) {
                filtered = filtered.filter(p => p.name.toLowerCase().includes(searchTerm) || p.brand.toLowerCase().includes(searchTerm));
            }
            displayProducts(filtered);
        }
        
        function displayProducts(products) {
            const container = document.getElementById('results');
            if (products.length === 0) {
                container.innerHTML = '<div class="card" style="text-align:center;">📭 No se encontraron productos</div>';
                return;
            }
            container.innerHTML = products.map(p => {
                const prices = p.prices || [];
                const sortedPrices = [...prices].sort((a,b) => a.price - b.price);
                const lowestPrice = sortedPrices[0]?.price;
                return `
                    <div class="product-card">
                        <div class="product-title">${p.name} - ${p.brand} <span style="font-size:12px; color:#64748b;">(${p.unit || 'unidad'})</span></div>
                        <div class="product-category">📂 ${p.categories?.name || 'Sin categoría'}</div>
                        <div class="price-list">
                            ${sortedPrices.map(pr => `
                                <div class="price-item">
                                    <span class="provider-name">🏪 ${pr.providers?.name}</span>
                                    <div>
                                        <span class="price-value">$${pr.price.toFixed(2)}</span>
                                        ${pr.price === lowestPrice && sortedPrices.length > 1 ? '<span style="background:#10b981; color:white; font-size:10px; padding:2px 6px; border-radius:20px; margin-left:8px;">Mejor</span>' : ''}
                                        <div style="font-size:10px; color:#94a3b8;">${new Date(pr.updated_at).toLocaleDateString()}</div>
                                    </div>
                                </div>
                            `).join('')}
                        </div>
                    </div>
                `;
            }).join('');
        }
        
        function filterByCategory(categoryId) {
            selectedCategory = categoryId;
            document.querySelectorAll('.category-btn').forEach(btn => btn.classList.remove('active'));
            event.target.classList.add('active');
            filterProducts();
        }
        
        checkAccess().then(() => {
            buildMenu();
            loadCategories();
            loadProducts();
        });
        document.getElementById('search').addEventListener('input', filterProducts);
    </script>
</body>
</html>
