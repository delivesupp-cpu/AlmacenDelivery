<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=yes">
    <title>Agregar Producto</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .unit-buttons {
            display: flex;
            gap: 8px;
            margin-top: 8px;
            flex-wrap: wrap;
        }
        .unit-btn {
            padding: 8px 16px;
            background: #f1f5f9;
            border: none;
            border-radius: 30px;
            font-size: 12px;
            cursor: pointer;
        }
        .suggestions-list {
            position: absolute;
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 12px;
            max-height: 150px;
            overflow-y: auto;
            width: 100%;
            z-index: 100;
        }
        .suggestion-item {
            padding: 10px 14px;
            cursor: pointer;
            border-bottom: 1px solid #f1f5f9;
        }
        .suggestion-item:hover { background: #f8fafc; }
        .relative { position: relative; }
    </style>
</head>
<body>
    <div class="main-content">
        <h1 style="margin-bottom: 8px;">➕ Agregar Producto</h1>
        <p style="color: #64748b; margin-bottom: 24px;">Cargá nuevos productos al sistema</p>
        
        <div class="card">
            <form id="productForm">
                <div class="form-group relative">
                    <label>📦 Producto *</label>
                    <input type="text" id="productName" placeholder="Ej: Arroz" required autocomplete="off">
                    <div id="productSuggestions" class="suggestions-list" style="display:none;"></div>
                </div>
                
                <div class="form-group">
                    <label>🏷️ Marca *</label>
                    <input type="text" id="brand" placeholder="Ej: Marolio" required>
                </div>
                
                <div class="form-group">
                    <label>📂 Categoría *</label>
                    <select id="category" required></select>
                </div>
                
                <div class="form-group">
                    <label>⚖️ Unidad *</label>
                    <input type="text" id="unit" placeholder="kg, litros, unidades" required>
                    <div class="unit-buttons">
                        <button type="button" class="unit-btn" onclick="setUnit('kg')">kg</button>
                        <button type="button" class="unit-btn" onclick="setUnit('litros')">litros</button>
                        <button type="button" class="unit-btn" onclick="setUnit('unidades')">unidades</button>
                    </div>
                </div>
                
                <div class="form-group">
                    <label>🏪 Proveedor *</label>
                    <select id="provider" required></select>
                </div>
                
                <div class="form-group">
                    <label>💰 Precio $ *</label>
                    <input type="number" id="price" step="0.01" placeholder="0.00" required>
                    <div id="priceIndicator" class="price-indicator" style="margin-top:8px;"></div>
                </div>
                
                <button type="submit" class="btn btn-primary" style="width:100%;">💾 Guardar Producto</button>
            </form>
            <div id="message"></div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/js/supabase-client.js"></script>
    <script src="/js/auth.js"></script>
    <script>
        let existingProducts = [];
        
        async function loadCategories() {
            const { data } = await window.supabaseClient.from('categories').select('id, name').order('name');
            const select = document.getElementById('category');
            select.innerHTML = '<option value="">Seleccionar</option>' + data.map(c => `<option value="${c.id}">${c.name}</option>`).join('');
        }
        
        async function loadProviders() {
            const { data } = await window.supabaseClient.from('providers').select('id, name').order('name');
            const select = document.getElementById('provider');
            select.innerHTML = '<option value="">Seleccionar</option>' + data.map(p => `<option value="${p.id}">${p.name}</option>`).join('');
        }
        
        async function loadExistingProducts() {
            const { data } = await window.supabaseClient.from('products').select('name, brand');
            existingProducts = data || [];
        }
        
        function setUnit(unit) { document.getElementById('unit').value = unit; }
        
        async function suggestProduct() {
            const productName = document.getElementById('productName').value.toLowerCase();
            if (productName.length < 2) {
                document.getElementById('productSuggestions').style.display = 'none';
                return;
            }
            const matches = existingProducts.filter(p => p.name.toLowerCase().includes(productName)).slice(0, 5);
            const suggestionsDiv = document.getElementById('productSuggestions');
            if (matches.length > 0) {
                suggestionsDiv.innerHTML = matches.map(p => `<div class="suggestion-item" onclick="selectProduct('${p.name}', '${p.brand}')"><strong>${p.name}</strong> - ${p.brand}</div>`).join('');
                suggestionsDiv.style.display = 'block';
            } else {
                suggestionsDiv.style.display = 'none';
            }
        }
        
        function selectProduct(name, brand) {
            document.getElementById('productName').value = name;
            document.getElementById('brand').value = brand;
            document.getElementById('productSuggestions').style.display = 'none';
            suggestUnitFromHistory(name, brand);
        }
        
        async function suggestUnitFromHistory(productName, brand) {
            const { data } = await window.supabaseClient.from('unit_suggestions').select('suggested_unit').eq('product_name', productName).eq('brand', brand).order('times_used', { ascending: false }).limit(1);
            if (data && data.length > 0) document.getElementById('unit').value = data[0].suggested_unit;
        }
        
        async function comparePrice() {
            const price = parseFloat(document.getElementById('price').value);
            const productName = document.getElementById('productName').value;
            const brand = document.getElementById('brand').value;
            const providerId = document.getElementById('provider').value;
            if (!productName || !brand || !price || !providerId) return;
            const { data: product } = await window.supabaseClient.from('products').select('id').eq('name', productName).eq('brand', brand).single();
            if (product) {
                const { data: prices } = await window.supabaseClient.from('prices').select('price').eq('product_id', product.id).neq('provider_id', providerId);
                if (prices && prices.length > 0) {
                    const avg = prices.reduce((a,b) => a + b.price, 0) / prices.length;
                    const diff = ((price - avg) / avg) * 100;
                    const indicator = document.getElementById('priceIndicator');
                    if (diff > 10) indicator.innerHTML = `<div class="price-up">⚠️ ${diff.toFixed(1)}% más caro que el promedio</div>`;
                    else if (diff < -10) indicator.innerHTML = `<div class="price-down">✓ ${Math.abs(diff).toFixed(1)}% más barato que el promedio</div>`;
                    else indicator.innerHTML = `<div style="color:#64748b;">ℹ️ Precio dentro del promedio (±${Math.abs(diff).toFixed(1)}%)</div>`;
                }
            }
        }
        
        async function saveProduct(event) {
            event.preventDefault();
            const productName = document.getElementById('productName').value.trim();
            const brand = document.getElementById('brand').value.trim();
            const categoryId = document.getElementById('category').value;
            const unit = document.getElementById('unit').value.trim();
            const providerId = document.getElementById('provider').value;
            const price = parseFloat(document.getElementById('price').value);
            const userId = localStorage.getItem('userId');
            if (!productName || !brand || !categoryId || !unit || !providerId || !price) {
                document.getElementById('message').innerHTML = '<div class="error-msg">Completa todos los campos</div>';
                return;
            }
            let productId;
            let { data: product } = await window.supabaseClient.from('products').select('id').eq('name', productName).eq('brand', brand).single();
            if (!product) {
                const { data: newProduct } = await window.supabaseClient.from('products').insert({ name: productName, brand: brand, category_id: categoryId, unit: unit }).select().single();
                if (!newProduct) return;
                productId = newProduct.id;
                await window.supabaseClient.from('unit_suggestions').upsert({ product_name: productName, brand: brand, suggested_unit: unit, times_used: 1 }, { onConflict: 'product_name,brand' });
            } else {
                productId = product.id;
            }
            const { error } = await window.supabaseClient.from('prices').insert({ product_id: productId, provider_id: providerId, price: price, updated_by: userId });
            if (!error) {
                document.getElementById('message').innerHTML = '<div class="success">✓ Producto guardado</div>';
                document.getElementById('productForm').reset();
                setTimeout(() => document.getElementById('message').innerHTML = '', 3000);
                loadExistingProducts();
            }
        }
        
        document.getElementById('productName').addEventListener('input', suggestProduct);
        document.getElementById('price').addEventListener('input', comparePrice);
        document.getElementById('provider').addEventListener('change', comparePrice);
        document.getElementById('productForm').addEventListener('submit', saveProduct);
        
        checkAccess().then(() => { buildMenu(); loadCategories(); loadProviders(); loadExistingProducts(); });
    </script>
</body>
</html>
