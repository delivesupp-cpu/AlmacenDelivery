<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Categorías</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="main-content">
        <h1 style="margin-bottom: 8px;">📂 Categorías</h1>
        <p style="color: #64748b; margin-bottom: 24px;">Gestioná las categorías de productos</p>
        
        <div class="card">
            <form id="categoryForm">
                <input type="text" id="categoryName" placeholder="Nueva categoría" required>
                <button type="submit" class="btn btn-primary" style="margin-top:12px;">Agregar</button>
            </form>
            <div id="message"></div>
        </div>
        
        <div id="categoriesList"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/js/supabase-client.js"></script>
    <script src="/js/auth.js"></script>
    <script>
        async function loadCategories() {
            const { data } = await window.supabaseClient.from('categories').select('*').order('name');
            const container = document.getElementById('categoriesList');
            if (data && data.length > 0) {
                container.innerHTML = data.map(c => `
                    <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                        <span>📁 ${c.name}</span>
                        <button onclick="deleteCategory(${c.id})" class="btn btn-danger" style="padding:6px 12px;">Eliminar</button>
                    </div>
                `).join('');
            } else {
                container.innerHTML = '<div class="card">No hay categorías</div>';
            }
        }
        
        async function addCategory(event) {
            event.preventDefault();
            const name = document.getElementById('categoryName').value.trim();
            if (!name) return;
            const { error } = await window.supabaseClient.from('categories').insert({ name });
            if (!error) {
                document.getElementById('message').innerHTML = '<div class="success">✓ Categoría agregada</div>';
                document.getElementById('categoryName').value = '';
                loadCategories();
                setTimeout(() => document.getElementById('message').innerHTML = '', 3000);
            }
        }
        
        async function deleteCategory(id) {
            if (confirm('¿Eliminar?')) {
                await window.supabaseClient.from('categories').delete().eq('id', id);
                loadCategories();
            }
        }
        
        document.getElementById('categoryForm').addEventListener('submit', addCategory);
        checkAccess().then(() => { buildMenu(); loadCategories(); });
    </script>
</body>
</html>
