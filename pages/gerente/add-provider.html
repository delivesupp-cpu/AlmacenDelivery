<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Agregar Proveedor</title>
    <link rel="stylesheet" href="/css/style.css">
    <style>
        .provider-card {
            background: white;
            padding: 16px;
            margin: 10px 0;
            border-radius: 12px;
            border: 1px solid #e9ecef;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
        }
        .provider-name {
            font-weight: bold;
            font-size: 16px;
        }
        .provider-contact {
            font-size: 13px;
            color: #666;
            margin-top: 5px;
        }
    </style>
</head>
<body>
    <div id="menu"></div>
    <div class="container">
        <h1>🏪 Agregar Proveedor</h1>
        
        <div class="card">
            <form id="providerForm">
                <div class="form-group">
                    <label>Nombre del Proveedor *</label>
                    <input type="text" id="name" placeholder="Ej: Distribuidora XYZ" required>
                </div>
                
                <div class="form-group">
                    <label>📱 WhatsApp</label>
                    <input type="text" id="whatsapp" placeholder="Ej: 011-12345678">
                </div>
                
                <div class="form-group">
                    <label>📧 Email</label>
                    <input type="email" id="email" placeholder="ejemplo@proveedor.com">
                </div>
                
                <div class="form-group">
                    <label>🌐 Sitio Web</label>
                    <input type="url" id="website" placeholder="https://...">
                </div>
                
                <button type="submit" class="btn btn-success">💾 Guardar Proveedor</button>
            </form>
            <div id="message"></div>
        </div>
        
        <h2>📋 Proveedores Existentes</h2>
        <div id="providersList">
            <div class="loading">Cargando...</div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/js/supabase-client.js"></script>
    <script src="/js/auth.js"></script>
    <script>
        async function loadProviders() {
            const { data } = await supabase.from('providers').select('*').order('name');
            const container = document.getElementById('providersList');
            
            if (data && data.length > 0) {
                container.innerHTML = data.map(p => `
                    <div class="provider-card">
                        <div>
                            <div class="provider-name">${p.name}</div>
                            <div class="provider-contact">
                                ${p.whatsapp ? `📱 ${p.whatsapp}` : ''}
                                ${p.email ? ` | 📧 ${p.email}` : ''}
                                ${p.website ? ` | 🌐 ${p.website}` : ''}
                            </div>
                        </div>
                        <button onclick="deleteProvider(${p.id})" class="btn btn-danger" style="padding:8px 16px;">🗑️ Eliminar</button>
                    </div>
                `).join('');
            } else {
                container.innerHTML = '<div class="card">📭 No hay proveedores cargados</div>';
            }
        }
        
        async function saveProvider(event) {
            event.preventDefault();
            
            const name = document.getElementById('name').value.trim();
            const whatsapp = document.getElementById('whatsapp').value;
            const email = document.getElementById('email').value;
            const website = document.getElementById('website').value;
            
            if (!name) {
                document.getElementById('message').innerHTML = '<div class="error-msg">❌ El nombre es obligatorio</div>';
                return;
            }
            
            const { error } = await supabase
                .from('providers')
                .insert({ name, whatsapp, email, website });
            
            if (!error) {
                document.getElementById('message').innerHTML = '<div class="success">✓ Proveedor guardado correctamente</div>';
                document.getElementById('providerForm').reset();
                loadProviders();
                setTimeout(() => document.getElementById('message').innerHTML = '', 3000);
            } else {
                document.getElementById('message').innerHTML = `<div class="error-msg">❌ Error: ${error.message}</div>`;
            }
        }
        
        async function deleteProvider(id) {
            if (confirm('¿Eliminar este proveedor? Se eliminarán también sus precios asociados.')) {
                const { error } = await supabase.from('providers').delete().eq('id', id);
                if (!error) {
                    loadProviders();
                } else {
                    alert('Error: ' + error.message);
                }
            }
        }
        
        document.getElementById('providerForm').addEventListener('submit', saveProvider);
        
        checkAccess().then(() => {
            buildMenu();
            loadProviders();
        });
    </script>
</body>
</html>
