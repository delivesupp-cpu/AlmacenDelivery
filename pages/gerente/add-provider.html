<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Agregar Proveedor</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/js/supabase-client.js"></script>
    <script src="/js/auth.js"></script>
    <script>
        // Cargar y mostrar proveedores
        async function loadProviders() {
            const { data } = await window.supabaseClient
                .from('providers')
                .select('*')
                .order('name');
            
            const container = document.getElementById('providersList');
            if (!container) return;
            
            if (data && data.length > 0) {
                container.innerHTML = data.map(p => `
                    <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                        <strong>${p.name}</strong>
                        <button onclick="deleteProvider(${p.id})" class="btn btn-danger" style="padding:6px 12px;">Eliminar</button>
                    </div>
                `).join('');
            } else {
                container.innerHTML = '<div class="card">📭 No hay proveedores</div>';
            }
        }
        
        // Guardar proveedor (solo nombre)
        async function saveProvider(event) {
            event.preventDefault();
            const name = document.getElementById('name').value.trim();
            
            if (!name) {
                document.getElementById('message').innerHTML = '<div class="error-msg">❌ El nombre es obligatorio</div>';
                return;
            }
            
            const { error } = await window.supabaseClient
                .from('providers')
                .insert({ name });
            
            if (!error) {
                document.getElementById('message').innerHTML = '<div class="success">✓ Proveedor guardado</div>';
                document.getElementById('providerForm').reset();
                loadProviders();
                setTimeout(() => document.getElementById('message').innerHTML = '', 3000);
            } else {
                document.getElementById('message').innerHTML = `<div class="error-msg">❌ ${error.message}</div>`;
            }
        }
        
        // Eliminar proveedor
        async function deleteProvider(id) {
            if (confirm('¿Eliminar este proveedor?')) {
                await window.supabaseClient.from('providers').delete().eq('id', id);
                loadProviders();
            }
        }
        
        // Inicializar página
        async function initPage() {
            await checkAccess();
            await buildMenu();
            
            setTimeout(() => {
                const mainContent = document.querySelector('.main-content');
                if (mainContent) {
                    mainContent.innerHTML = `
                        <h1>🏪 Proveedores</h1>
                        
                        <div class="card">
                            <h3>Agregar Proveedor</h3>
                            <form id="providerForm">
                                <input type="text" id="name" placeholder="Nombre del proveedor" required>
                                <button type="submit" class="btn btn-primary" style="margin-top:12px;">Guardar</button>
                            </form>
                            <div id="message"></div>
                        </div>
                        
                        <h2>Lista de Proveedores</h2>
                        <div id="providersList">Cargando...</div>
                    `;
                    
                    document.getElementById('providerForm').addEventListener('submit', saveProvider);
                    loadProviders();
                }
            }, 100);
        }
        
        initPage();
    </script>
</body>
</html>
