<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Agregar Proveedor</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <!-- El contenido se insertará dinámicamente por auth.js -->
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/js/supabase-client.js"></script>
    <script src="/js/auth.js"></script>
    <script>
        // Función para cargar y mostrar proveedores
        async function loadAndDisplayProviders() {
            console.log('Cargando proveedores...');
            const { data, error } = await window.supabaseClient
                .from('providers')
                .select('*')
                .order('name');
            
            console.log('Datos recibidos:', data);
            
            const container = document.getElementById('providersList');
            if (!container) {
                console.error('No se encontró el contenedor providersList');
                return;
            }
            
            if (data && data.length > 0) {
                container.innerHTML = data.map(p => `
                    <div class="card" style="display:flex; justify-content:space-between; align-items:center; margin-bottom:12px;">
                        <div>
                            <strong style="font-size:16px;">${escapeHtml(p.name)}</strong>
                            <div style="font-size:12px; color:#64748b; margin-top:4px;">
                                ${p.whatsapp ? `📱 ${escapeHtml(p.whatsapp)}` : ''}
                                ${p.email ? ` | 📧 ${escapeHtml(p.email)}` : ''}
                                ${p.website ? ` | 🌐 ${escapeHtml(p.website)}` : ''}
                            </div>
                        </div>
                        <button onclick="deleteProvider(${p.id})" class="btn btn-danger" style="padding:6px 12px;">🗑️ Eliminar</button>
                    </div>
                `).join('');
            } else {
                container.innerHTML = '<div class="card" style="text-align:center; color:#64748b;">📭 No hay proveedores cargados</div>';
            }
        }
        
        // Función auxiliar para escapar HTML
        function escapeHtml(str) {
            if (!str) return '';
            return str.replace(/[&<>]/g, function(m) {
                if (m === '&') return '&amp;';
                if (m === '<') return '&lt;';
                if (m === '>') return '&gt;';
                return m;
            });
        }
        
        // Guardar nuevo proveedor
        async function saveProvider(event) {
            event.preventDefault();
            console.log('Guardando proveedor...');
            
            const name = document.getElementById('name').value.trim();
            const whatsapp = document.getElementById('whatsapp').value;
            const email = document.getElementById('email').value;
            const website = document.getElementById('website').value;
            
            if (!name) {
                document.getElementById('message').innerHTML = '<div class="error-msg">❌ El nombre es obligatorio</div>';
                return;
            }
            
            const { data, error } = await window.supabaseClient
                .from('providers')
                .insert({ name, whatsapp, email, website });
            
            if (!error) {
                document.getElementById('message').innerHTML = '<div class="success">✓ Proveedor guardado correctamente</div>';
                document.getElementById('providerForm').reset();
                await loadAndDisplayProviders(); // Recargar la lista
                setTimeout(() => {
                    document.getElementById('message').innerHTML = '';
                }, 3000);
            } else {
                document.getElementById('message').innerHTML = `<div class="error-msg">❌ Error: ${error.message}</div>`;
            }
        }
        
        // Eliminar proveedor
        async function deleteProvider(id) {
            if (confirm('¿Eliminar este proveedor? Se eliminarán también sus precios asociados.')) {
                const { error } = await window.supabaseClient
                    .from('providers')
                    .delete()
                    .eq('id', id);
                
                if (!error) {
                    await loadAndDisplayProviders(); // Recargar la lista
                } else {
                    alert('Error: ' + error.message);
                }
            }
        }
        
        // Crear el HTML de la página después de que auth.js construya el sidebar
        async function initPage() {
            await checkAccess();
            await buildMenu();
            
            // Esperar un poco para que el DOM se actualice
            setTimeout(() => {
                // Buscar el main-content y agregar nuestro contenido
                const mainContent = document.querySelector('.main-content');
                if (mainContent) {
                    mainContent.innerHTML = `
                        <h1 style="margin-bottom: 8px;">🏪 Agregar Proveedor</h1>
                        <p style="color: #64748b; margin-bottom: 24px;">Registrá nuevos proveedores al sistema</p>
                        
                        <div class="card">
                            <h3 style="margin-bottom: 16px;">➕ Nuevo Proveedor</h3>
                            <form id="providerForm">
                                <div class="form-group">
                                    <label>Nombre del Proveedor *</label>
                                    <input type="text" id="name" placeholder="Ej: Distribuidora XYZ" required>
                                </div>
                                
                                <div class="form-group">
                                    <label>📱 WhatsApp</label>
                                    <input type="text" id="whatsapp" placeholder="Ej: 011-12345678">
                                </div>
                                
                                <div class="form-group">
                                    <label>📧 Email</label>
                                    <input type="email" id="email" placeholder="ejemplo@proveedor.com">
                                </div>
                                
                                <div class="form-group">
                                    <label>🌐 Sitio Web</label>
                                    <input type="url" id="website" placeholder="https://...">
                                </div>
                                
                                <button type="submit" class="btn btn-primary" style="width:100%;">💾 Guardar Proveedor</button>
                            </form>
                            <div id="message"></div>
                        </div>
                        
                        <h2 style="margin: 32px 0 16px;">📋 Proveedores Existentes</h2>
                        <div id="providersList">
                            <div style="text-align:center; padding:20px; color:#64748b;">Cargando proveedores...</div>
                        </div>
                    `;
                    
                    // Conectar eventos después de insertar el HTML
                    document.getElementById('providerForm').addEventListener('submit', saveProvider);
                    
                    // Cargar la lista de proveedores
                    loadAndDisplayProviders();
                } else {
                    console.error('No se encontró .main-content');
                }
            }, 100);
        }
        
        // Iniciar la página
        initPage();
    </script>
</body>
</html>
