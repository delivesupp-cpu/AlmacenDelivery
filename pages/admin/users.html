<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Usuarios</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="main-content">
        <h1 style="margin-bottom: 8px;">👥 Usuarios</h1>
        <p style="color: #64748b; margin-bottom: 24px;">Gestión de usuarios del sistema</p>
        
        <div class="card">
            <h3 style="margin-bottom: 16px;">Agregar Usuario</h3>
            <form id="userForm">
                <input type="email" id="email" placeholder="Email" required>
                <input type="password" id="password" placeholder="Contraseña" required style="margin-top:12px;">
                <select id="roleId" required style="margin-top:12px;"></select>
                <button type="submit" class="btn btn-primary" style="margin-top:16px;">Agregar</button>
            </form>
            <div id="message"></div>
        </div>
        
        <div id="usersList"></div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/js/supabase-client.js"></script>
    <script src="/js/auth.js"></script>
    <script>
        async function loadRoles() {
            const { data } = await window.supabaseClient.from('roles').select('id, name');
            const select = document.getElementById('roleId');
            select.innerHTML = data.map(r => `<option value="${r.id}">${r.name}</option>`).join('');
        }
        
        async function loadUsers() {
            const { data } = await window.supabaseClient.from('users').select('id, email, role_id, roles(name)').order('created_at');
            const container = document.getElementById('usersList');
            if (data && data.length > 0) {
                container.innerHTML = data.map(u => `
                    <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                        <div><strong>${u.email}</strong><div style="font-size:12px;">Rol: ${u.roles?.name}</div></div>
                        ${u.email !== 'admin@despensa.com' ? `<button onclick="deleteUser('${u.id}')" class="btn btn-danger">Eliminar</button>` : '<span>Admin</span>'}
                    </div>
                `).join('');
            } else {
                container.innerHTML = '<div class="card">No hay usuarios</div>';
            }
        }
        
        async function addUser(event) {
            event.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const roleId = document.getElementById('roleId').value;
            const { error } = await window.supabaseClient.from('users').insert({ email, password, role_id: roleId });
            if (!error) {
                document.getElementById('message').innerHTML = '<div class="success">✓ Usuario agregado</div>';
                document.getElementById('userForm').reset();
                loadUsers();
                setTimeout(() => document.getElementById('message').innerHTML = '', 3000);
            }
        }
        
        async function deleteUser(id) {
            if (confirm('¿Eliminar?')) {
                await window.supabaseClient.from('users').delete().eq('id', id);
                loadUsers();
            }
        }
        
        document.getElementById('userForm').addEventListener('submit', addUser);
        checkAccess().then(() => { buildMenu(); loadRoles(); loadUsers(); });
    </script>
</body>
</html>
