<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Roles</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="main-content">
        <h1 style="margin-bottom: 8px;">🎭 Roles</h1>
        <p style="color: #64748b; margin-bottom: 24px;">Gestión de roles del sistema</p>
        
        <div class="card">
            <h3 style="margin-bottom: 16px;">Agregar Rol</h3>
            <form id="roleForm">
                <input type="text" id="roleName" placeholder="Nombre del rol" required>
                <button type="submit" class="btn btn-primary" style="margin-top:12px;">Agregar</button>
            </form>
            <div id="message"></div>
        </div>
        
        <div id="rolesList"></div>
        
        <div style="background:#f1f5f9; padding:16px; border-radius:16px; margin-top:24px;">
            <strong>⚙️ Permisos</strong><br>
            <span style="font-size:13px; color:#64748b;">Editar <code>roles-config.txt</code> para configurar qué páginas puede ver cada rol.</span>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="/js/supabase-client.js"></script>
    <script src="/js/auth.js"></script>
    <script>
        async function loadRoles() {
            const { data } = await window.supabaseClient.from('roles').select('*').order('id');
            const container = document.getElementById('rolesList');
            if (data && data.length > 0) {
                container.innerHTML = data.map(r => `
                    <div class="card" style="display:flex; justify-content:space-between; align-items:center;">
                        <span><strong>${r.name}</strong> ${['admin','gerente','cajero'].includes(r.name) ? '<span style="background:#e2e8f0; padding:2px 8px; border-radius:20px; font-size:11px; margin-left:8px;">Base</span>' : ''}</span>
                        ${!['admin','gerente','cajero'].includes(r.name) ? `<button onclick="deleteRole(${r.id})" class="btn btn-danger">Eliminar</button>` : ''}
                    </div>
                `).join('');
            } else {
                container.innerHTML = '<div class="card">No hay roles</div>';
            }
        }
        
        async function addRole(event) {
            event.preventDefault();
            const name = document.getElementById('roleName').value.trim().toLowerCase();
            if (!name) return;
            const { error } = await window.supabaseClient.from('roles').insert({ name });
            if (!error) {
                document.getElementById('message').innerHTML = '<div class="success">✓ Rol agregado</div>';
                document.getElementById('roleName').value = '';
                loadRoles();
                setTimeout(() => document.getElementById('message').innerHTML = '', 3000);
            }
        }
        
        async function deleteRole(id) {
            if (confirm('¿Eliminar?')) {
                await window.supabaseClient.from('roles').delete().eq('id', id);
                loadRoles();
            }
        }
        
        document.getElementById('roleForm').addEventListener('submit', addRole);
        checkAccess().then(() => { buildMenu(); loadRoles(); });
    </script>
</body>
</html>
