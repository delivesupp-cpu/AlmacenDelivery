<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>AlmacenDelivery</title>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Inter', sans-serif;
            background: #f8fafc;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .hero {
            text-align: center;
            padding: 40px;
        }
        .hero h1 {
            font-size: 48px;
            font-weight: 700;
            background: linear-gradient(135deg, #0f172a, #334155);
            -webkit-text-fill-color: transparent;
            margin-bottom: 16px;
        }
        .hero p {
            color: #64748b;
            margin-bottom: 32px;
            font-size: 18px;
        }
        .btn {
            display: inline-block;
            padding: 12px 32px;
            background: #0f172a;
            color: white;
            text-decoration: none;
            border-radius: 40px;
            font-weight: 500;
            transition: all 0.2s;
        }
        .btn:hover {
            background: #1e293b;
            transform: translateY(-2px);
        }
    </style>
</head>
<body>
    <div class="hero">
        <h1>AlmacenDelivery</h1>
        <p>Sistema de control de precios por proveedor</p>
        <a href="/login.html" class="btn">Iniciar Sesión</a>
    </div>
</body>
</html>
